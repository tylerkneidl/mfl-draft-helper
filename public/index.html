<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#181030" />
<title>MetroStars — Draft Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,800&family=Zilla+Slab:wght@600;700&family=Hanken+Grotesk:wght@400;500;600&family=Monoton&display=swap" rel="stylesheet" />
<style>
  :root {
    --dusk: #181030; --dusk2: #211741; --stub: #2a1d54; --line: #3f2e6e;
    --txt: #f6eeff; --mut: #bda6e4; --dim: #735fa6;
    --take: #ff2d95; --lean: #ffab33; --wait: #19dccb;
    --gold: #ffd36e; --violet: #8268ff;
    --disp: "Saira Condensed", system-ui, sans-serif;
    --slab: "Zilla Slab", Georgia, serif;
    --body: "Hanken Grotesk", system-ui, sans-serif;
    --neon: "Monoton", var(--disp);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--dusk); color: var(--txt); font-family: var(--body);
    min-height: 100dvh; max-width: 560px; margin: 0 auto;
    padding: 0 14px calc(76px + env(safe-area-inset-bottom));
  }
  #app { position: relative; }

  /* header */
  header { display: flex; align-items: center; gap: 10px; padding: 18px 4px 14px;
    position: sticky; top: 0; z-index: 5; background: linear-gradient(var(--dusk) 72%, transparent); }
  .brand { font-family: var(--disp); font-weight: 800; font-size: 17px; letter-spacing: .06em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--take), var(--violet) 55%, var(--wait));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .live { width: 8px; height: 8px; border-radius: 50%; background: var(--wait);
    box-shadow: 0 0 8px var(--wait); animation: ping 2.4s infinite; }
  @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(25,220,203,.5); } 70%,100% { box-shadow: 0 0 0 8px transparent; } }
  .spacer { flex: 1; }
  .prog { font-family: var(--slab); font-weight: 700; font-size: 12px; color: var(--mut);
    font-variant-numeric: tabular-nums; }
  .dry { font-family: var(--disp); font-size: 10px; font-weight: 800; letter-spacing: .12em;
    padding: 3px 7px; border: 1px solid var(--lean); color: var(--lean); border-radius: 4px; }
  .bigclock { position: relative; font-family: var(--slab); font-weight: 700;
    font-variant-numeric: tabular-nums; font-size: 27px; line-height: 1; color: var(--txt);
    margin-top: 13px; letter-spacing: .01em; }
  .bigclock .u { font-family: var(--disp); font-weight: 700; font-size: 12px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--mut); margin-left: 7px; }
  .bigclock.warn { color: var(--lean); }
  .bigclock.crit { color: var(--take); animation: blink 1s steps(2) infinite; }
  .hero .autopick { font-family: var(--disp); font-weight: 700; font-size: 12.5px; letter-spacing: .03em;
    margin-top: 12px; color: var(--mut); display: flex; align-items: center; gap: 6px; }
  .hero .autopick b { font-family: var(--slab); font-variant-numeric: tabular-nums; color: var(--txt); }
  .hero .autopick.off { opacity: .7; }

  /* hero — the one maximalist moment */
  .hero { position: relative; overflow: hidden; border: 1px solid var(--line); background: var(--dusk2);
    border-radius: 16px; padding: 22px 20px 24px; margin-bottom: 16px; }
  .hero::before { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(130% 90% at 0% 0%, rgba(255,45,149,.2), transparent 46%),
                radial-gradient(130% 90% at 100% 0%, rgba(25,220,203,.16), transparent 46%); }
  .hero .eyebrow { position: relative; font-family: var(--neon); font-size: 14px;
    text-transform: uppercase; letter-spacing: .02em; color: var(--mut); }
  .hero h1 { position: relative; font-family: var(--disp); font-weight: 800; font-size: 33px;
    line-height: .98; margin-top: 12px; letter-spacing: -.01em; }
  .hero .sub { position: relative; font-family: var(--body); font-size: 13px; color: var(--mut); margin-top: 11px; }
  .hero .sub b { color: var(--txt); font-family: var(--slab); font-weight: 700; font-variant-numeric: tabular-nums; }
  .hero .sunset { position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
    background: linear-gradient(90deg, var(--take), var(--lean) 52%, var(--wait));
    box-shadow: 0 0 16px -2px var(--take); }
  .hero.me { border-color: var(--take); box-shadow: 0 0 46px -10px rgba(255,45,149,.6); }
  .hero.me .eyebrow { color: var(--take); text-shadow: 0 0 13px rgba(255,45,149,.85);
    animation: blink 1.4s steps(2) infinite; }
  .hero.me h1 { font-style: italic; }
  @keyframes blink { 50% { opacity: .35; } }

  /* rare trade banner */
  .trade { border-radius: 11px; padding: 12px 14px; margin: 0 0 14px; display: flex; gap: 11px;
    align-items: center; font-family: var(--body); font-size: 13.5px; line-height: 1.35; animation: deal .4s both; }
  .trade .ic { font-family: var(--slab); font-size: 19px; line-height: 1; }
  .trade b { font-family: var(--disp); font-weight: 800; }
  .trade .k { font-family: var(--disp); font-size: 9.5px; font-weight: 800; letter-spacing: .12em;
    text-transform: uppercase; display: block; margin-bottom: 2px; opacity: .9; }
  .trade.up { border: 1px solid var(--take); background: rgba(255,45,149,.12); color: #ffd7ec; }
  .trade.up .ic, .trade.up .k { color: var(--take); }
  .trade.down { border: 1px solid var(--wait); background: rgba(25,220,203,.1); color: #c7f6f1; }
  .trade.down .ic, .trade.down .k { color: var(--wait); }

  .listhead { display: flex; align-items: baseline; gap: 8px; padding: 6px 2px 12px; }
  .listhead h2 { font-family: var(--disp); font-size: 13px; font-weight: 800; letter-spacing: .12em;
    text-transform: uppercase; color: var(--txt); }
  .listhead .hint { font-family: var(--disp); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--dim); margin-left: auto; }

  /* candidate card — ticket stub */
  .card { display: flex; position: relative; overflow: hidden; background: var(--dusk2);
    border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px;
    animation: deal .35s both; }
  @keyframes deal { from { opacity: 0; transform: translateY(7px); } }
  .stub { flex: 0 0 54px; background: var(--stub); border-right: 2px dashed var(--line);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
  .rnum { font-family: var(--slab); font-weight: 700; font-size: 27px; line-height: 1;
    color: var(--gold); font-variant-numeric: tabular-nums; }
  .rlbl { font-family: var(--disp); font-size: 8px; font-weight: 800; letter-spacing: .16em; color: var(--dim); }
  .card::before, .card::after { content: ""; position: absolute; left: 47px; width: 14px; height: 14px;
    background: var(--dusk); border-radius: 50%; }
  .card::before { top: -7px; }
  .card::after { bottom: -7px; }
  .body { flex: 1; min-width: 0; padding: 13px 14px; }
  .top { display: flex; align-items: flex-start; gap: 10px; }
  .who { flex: 1; min-width: 0; }
  .nm { font-family: var(--disp); font-weight: 700; font-size: 21px; line-height: 1.05; letter-spacing: -.01em; }
  .meta { font-family: var(--disp); font-size: 11px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--mut); margin-top: 3px; }
  .chip { font-family: var(--disp); font-weight: 800; font-size: 10.5px; letter-spacing: .1em;
    padding: 5px 9px; border-radius: 5px; text-transform: uppercase; white-space: nowrap; color: var(--dusk); }
  .chip.take { background: var(--take); } .chip.lean { background: var(--lean); } .chip.wait { background: var(--wait); }

  .stats { display: flex; align-items: center; gap: 14px; margin: 13px 0 2px; }
  .copies { display: flex; gap: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid var(--dim); }
  .dot.on { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 6px -1px var(--gold); }
  .surv { flex: 1; }
  .surv .bar { height: 6px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
  .surv .fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
  .fill.take { background: var(--take); } .fill.lean { background: var(--lean); } .fill.wait { background: var(--wait); }
  .surv .lab { display: flex; justify-content: space-between; margin-top: 5px;
    font-family: var(--disp); font-size: 10px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--mut); }
  .pct { font-family: var(--slab); font-weight: 700; font-variant-numeric: tabular-nums; }
  .pct.take { color: var(--take); } .pct.lean { color: var(--lean); } .pct.wait { color: var(--wait); }
  .why { font-family: var(--body); font-size: 13px; line-height: 1.45; color: var(--mut);
    margin-top: 11px; border-top: 1px dashed var(--line); padding-top: 11px; }

  .draft { width: 100%; margin-top: 13px; padding: 13px; border-radius: 9px; cursor: pointer;
    font-family: var(--disp); font-weight: 800; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    background: transparent; color: var(--dim); border: 1px solid var(--line); }
  .card.actionable .draft { background: var(--take); color: var(--dusk); border-color: var(--take);
    box-shadow: 0 0 22px -8px var(--take); }
  .card.actionable .draft:active { transform: scale(.985); }

  .foot { text-align: center; font-family: var(--disp); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--dim); margin-top: 18px; }

  /* confirm sheet */
  .sheet { position: fixed; inset: 0; z-index: 20; display: none; align-items: flex-end;
    background: rgba(10,6,24,.66); backdrop-filter: blur(3px); }
  .sheet.open { display: flex; }
  .sheet .panel { width: 100%; max-width: 560px; margin: 0 auto; background: var(--dusk2);
    border: 1px solid var(--line); border-top: 2px solid var(--take); border-bottom: none;
    border-radius: 18px 18px 0 0; padding: 22px 18px calc(22px + env(safe-area-inset-bottom)); animation: up .25s ease; }
  @keyframes up { from { transform: translateY(100%); } }
  .sheet .q { font-family: var(--disp); font-weight: 800; font-size: 24px; }
  .sheet .det { font-family: var(--body); font-size: 12px; color: var(--mut); margin: 8px 0 18px; }
  .sheet .row { display: flex; gap: 10px; }
  .sheet button { flex: 1; padding: 14px; border-radius: 11px; cursor: pointer; border: 1px solid var(--line);
    font-family: var(--disp); font-weight: 800; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; }
  .sheet .yes { background: var(--take); color: var(--dusk); border-color: var(--take); }
  .sheet .no { background: transparent; color: var(--mut); }
  .sheet .result { font-family: var(--body); font-size: 14px; line-height: 1.5; color: var(--txt); }
  .skel { font-family: var(--disp); font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--dim); text-align: center; padding: 40px 0; }

  /* bottom tab bar */
  .tabs { position: fixed; left: 0; right: 0; bottom: 0; z-index: 15; display: flex; gap: 8px;
    padding: 8px 14px calc(8px + env(safe-area-inset-bottom)); max-width: 560px; margin: 0 auto;
    background: linear-gradient(transparent, var(--dusk) 30%); }
  .tab { flex: 1; padding: 13px; border-radius: 11px; border: 1px solid var(--line); background: var(--dusk2);
    color: var(--mut); font-family: var(--disp); font-weight: 800; font-size: 12px; letter-spacing: .14em;
    text-transform: uppercase; cursor: pointer; }
  .tab span { font-size: 14px; margin-right: 5px; }
  .tab.active { color: var(--txt); border-color: var(--take); background: var(--stub);
    box-shadow: 0 0 22px -10px var(--take); }

  /* full rankings rows */
  .tier { font-family: var(--disp); font-size: 10px; font-weight: 800; letter-spacing: .16em;
    text-transform: uppercase; color: var(--dim); padding: 16px 4px 8px;
    position: sticky; top: 54px; background: linear-gradient(var(--dusk) 70%, transparent); z-index: 2; }
  .rrow { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--line); }
  .rrow.gone { opacity: .32; }
  .rrk { font-family: var(--slab); font-weight: 700; font-size: 15px; color: var(--gold);
    min-width: 34px; font-variant-numeric: tabular-nums; }
  .rwho { flex: 1; min-width: 0; }
  .rnm { font-family: var(--disp); font-weight: 700; font-size: 17px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rrow.gone .rnm { text-decoration: line-through; }
  .rmeta { font-family: var(--disp); font-size: 10.5px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: var(--mut); }
  .rright { display: flex; align-items: center; gap: 9px; }
  .gonetag { font-family: var(--disp); font-size: 9px; font-weight: 800; letter-spacing: .1em;
    color: var(--take); border: 1px solid var(--take); border-radius: 4px; padding: 2px 6px; }

  /* draft history rows */
  .hrow { display: flex; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--line); }
  .hrow.mine { background: rgba(255,45,149,.08); border-left: 2px solid var(--take);
    padding-left: 8px; margin: 0 -6px; border-radius: 6px; border-bottom-color: transparent; }
  .hpk { font-family: var(--slab); font-weight: 700; font-size: 13px; color: var(--mut);
    min-width: 42px; font-variant-numeric: tabular-nums; }
  .hwho { flex: 1; min-width: 0; }
  .hplayer { font-family: var(--disp); font-weight: 700; font-size: 16px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hteam { font-family: var(--disp); font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
    text-transform: uppercase; color: var(--mut); margin-top: 1px; }
  .hpos { font-family: var(--disp); font-size: 10px; font-weight: 800; letter-spacing: .08em;
    color: var(--gold); border: 1px solid var(--line); border-radius: 4px; padding: 2px 6px; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>

<div id="app">
  <header>
    <span class="live"></span>
    <span class="brand" id="brand">METROSTARS</span>
    <span class="spacer"></span>
    <span class="prog" id="prog">—</span>
    <span class="dry" id="dry" hidden>DRY RUN</span>
  </header>
  <main id="view-draft">
    <div id="hero"></div>
    <div id="trade"></div>
    <div class="listhead"><h2 id="listtitle">Board</h2><span class="hint" id="hint"></span></div>
    <div id="list"><div class="skel">acquiring draft feed…</div></div>
    <div class="foot" id="foot"></div>
  </main>
  <main id="view-board" hidden>
    <div class="listhead"><h2 id="rtitle">Full Board</h2><span class="hint" id="rhint"></span></div>
    <div id="rankings"><div class="skel">loading board…</div></div>
  </main>
  <main id="view-history" hidden>
    <div class="listhead"><h2>Draft History</h2><span class="hint" id="hhint"></span></div>
    <div id="history"><div class="skel">loading history…</div></div>
  </main>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="draft"><span>◈</span> Draft</button>
  <button class="tab" data-tab="board"><span>≣</span> Board</button>
  <button class="tab" data-tab="history"><span>⟲</span> History</button>
</nav>

<div class="sheet" id="sheet">
  <div class="panel" id="sheetPanel"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let latest = null;

async function load() {
  try {
    const b = await (await fetch("/api/board")).json();
    latest = b;
    render(b);
  } catch (e) {
    $("#list").innerHTML = `<div class="skel">feed unavailable — retrying…</div>`;
  }
}

function render(b) {
  $("#dry").hidden = !b.dryRun;
  if (b.myTeam) $("#brand").textContent = b.myTeam;
  $("#prog").textContent = `PICK ${b.picksMade + 1} / ${b.totalPicks}`;
  const clock = b.onTheClock;
  const me = clock && clock.isMe;

  const clockEl = b.clock ? `<div class="bigclock" id="clock"></div>` : "";
  $("#hero").innerHTML = me
    ? `<div class="hero me"><div class="eyebrow">● On the clock</div>
         <h1>Round ${+clock.round}, Pick ${+clock.pick}</h1>
         ${clockEl}
         <div class="sub">tap a player below to draft them${b.dryRun ? " · <b>dry run</b>" : ""}</div>
         ${b.autopick ? `<div class="autopick${b.autopick.armed ? "" : " off"}" id="autopick"></div>` : ""}
         <div class="sunset"></div></div>`
    : `<div class="hero"><div class="eyebrow">On the clock</div>
         <h1>${clock ? (clock.franchiseName || `Franchise ${clock.franchise}`) : "Draft complete"}</h1>
         ${clockEl}
         <div class="sub">${b.myNextPick
            ? `your pick: <b>R${+b.myNextPick.round} P${+b.myNextPick.pick}</b> · in <b>${b.gap}</b> picks`
            : "no upcoming picks"}</div>
         <div class="sunset"></div></div>`;

  $("#trade").innerHTML = tradeBanner(b.trade);
  $("#listtitle").textContent = me ? "Who do you want?"
    : `Likely at your pick${b.myNextPick ? ` (R${+b.myNextPick.round} P${+b.myNextPick.pick})` : ""}`;
  $("#hint").textContent = me ? "tap to draft" : "peek ahead";
  $("#list").innerHTML = b.candidates.map((c, i) => card(c, i, b.mode)).join("");
  b.candidates.forEach((c) => {
    const el = document.getElementById("draft-" + c.id);
    if (el) el.onclick = () => confirmPick(c);
  });
  $("#foot").textContent = `updated ${new Date().toLocaleTimeString()} · auto-refresh 15s`;
  tickClock();
}

function tradeBanner(t) {
  if (!t) return "";
  if (t.type === "up") return `<div class="trade up"><span class="ic">⬆</span><div>
    <span class="k">Consider trading up</span>
    <b>${t.player.name}</b> likely won't reach you — and it's a tier cliff after him.</div></div>`;
  return `<div class="trade down"><span class="ic">⬇</span><div>
    <span class="k">Consider trading down</span>
    Your targets should keep (flat value) — bank picks instead of using this slot.</div></div>`;
}

function card(c, i, mode) {
  const me = mode === "onclock";
  const pct = Math.round(c.pSurvive * 100);
  const dots = [0, 1, 2].map((d) => `<span class="dot ${d < c.remaining ? "on" : ""}"></span>`).join("");
  // chip wording depends on context: on the clock you can act (take/wait);
  // waiting, you can only forecast (safe/slipping).
  const labels = me
    ? { take: "TAKE NOW", lean: "LEAN", wait: "WAIT" }
    : { take: "SLIPPING", lean: "COIN FLIP", wait: "SAFE" };
  const survLabel = me ? "survives to your next pick" : "survives to your pick";
  return `<div class="card ${me ? "actionable" : ""}" style="animation-delay:${Math.min(i, 8) * 30}ms">
    <div class="stub"><span class="rnum">${c.rank}</span><span class="rlbl">Rank</span></div>
    <div class="body">
      <div class="top">
        <div class="who"><div class="nm">${c.name}</div><div class="meta">${c.pos} · ${c.nfl}</div></div>
        <span class="chip ${c.call}">${labels[c.call]}</span>
      </div>
      <div class="stats">
        <div class="copies" title="copies left">${dots}</div>
        <div class="surv">
          <div class="bar"><div class="fill ${c.call}" style="width:${pct}%"></div></div>
          <div class="lab"><span>${survLabel}</span><span class="pct ${c.call}">${pct}%</span></div>
        </div>
      </div>
      <div class="why">${c.why}</div>
      <button class="draft" id="draft-${c.id}">${me ? "Draft " + c.name.split(",")[0] : "not your pick yet"}</button>
    </div>
  </div>`;
}

function confirmPick(c) {
  const me = latest?.onTheClock?.isMe;
  if (!me) return;
  const sheet = $("#sheet");
  $("#sheetPanel").innerHTML = `
    <div class="q">Draft ${c.name}?</div>
    <div class="det">${c.pos} · ${c.nfl} · R${+latest.onTheClock.round} P${+latest.onTheClock.pick}
      ${latest.dryRun ? "· DRY RUN (won't submit)" : ""}</div>
    <div class="row"><button class="no" id="cancel">Cancel</button>
      <button class="yes" id="go">${latest.dryRun ? "Preview" : "Draft"}</button></div>`;
  sheet.classList.add("open");
  $("#cancel").onclick = () => sheet.classList.remove("open");
  $("#go").onclick = () => submitPick(c);
}

async function submitPick(c) {
  $("#sheetPanel").innerHTML = `<div class="result">submitting ${c.name}…</div>`;
  try {
    const r = await (await fetch("/api/pick", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ playerId: c.id }),
    })).json();
    const msg = r.dryRun
      ? `🧪 DRY RUN — would draft <b>${r.would.name}</b> at R${+r.would.round} P${+r.would.pick}.<br><br>Set DRY_RUN=false to arm live picks.`
      : r.drafted
      ? `✅ Drafted <b>${r.drafted.name}</b>.`
      : `⚠️ ${r.error || "could not draft"}`;
    $("#sheetPanel").innerHTML = `<div class="result">${msg}</div>
      <div class="row" style="margin-top:18px"><button class="no" id="done">Close</button></div>`;
    $("#done").onclick = () => { $("#sheet").classList.remove("open"); load(); };
  } catch (e) {
    $("#sheetPanel").innerHTML = `<div class="result">⚠️ request failed</div>
      <div class="row" style="margin-top:18px"><button class="no" id="done">Close</button></div>`;
    $("#done").onclick = () => $("#sheet").classList.remove("open");
  }
}

// --- full board tab ---
function renderRankings(b) {
  const avail = b.players.filter((p) => p.remaining >= 1).length;
  $("#rhint").textContent = `${avail} / ${b.players.length} available`;
  let html = "", tier = null;
  for (const p of b.players) {
    if (p.tier !== tier) { tier = p.tier; html += `<div class="tier">Tier ${tier}</div>`; }
    const gone = p.remaining < 1;
    const dots = [0, 1, 2].map((d) => `<span class="dot ${d < p.remaining ? "on" : ""}"></span>`).join("");
    html += `<div class="rrow ${gone ? "gone" : ""}">
      <span class="rrk">${p.rank}</span>
      <div class="rwho"><div class="rnm">${p.name}</div><div class="rmeta">${p.pos} · ${p.nfl}</div></div>
      <div class="rright">${gone ? `<span class="gonetag">GONE</span>` : `<div class="copies">${dots}</div>`}</div>
    </div>`;
  }
  $("#rankings").innerHTML = html;
}
async function loadRankings() {
  try { renderRankings(await (await fetch("/api/rankings")).json()); }
  catch { $("#rankings").innerHTML = `<div class="skel">board unavailable</div>`; }
}

// --- draft history tab ---
function renderHistory(b) {
  $("#hhint").textContent = `${b.picks.length} picks`;
  if (!b.picks.length) { $("#history").innerHTML = `<div class="skel">no picks yet</div>`; return; }
  $("#history").innerHTML = b.picks.map((p) => `
    <div class="hrow ${p.mine ? "mine" : ""}">
      <span class="hpk">${+p.round}.${String(p.pick).padStart(2, "0")}</span>
      <div class="hwho"><div class="hplayer">${p.name}</div><div class="hteam">${p.team}</div></div>
      <span class="hpos">${p.pos}</span>
    </div>`).join("");
}
async function loadHistory() {
  try { renderHistory(await (await fetch("/api/history")).json()); }
  catch { $("#history").innerHTML = `<div class="skel">history unavailable</div>`; }
}

// --- tabs ---
let tab = "draft";
const refreshTab = () => (tab === "draft" ? load() : tab === "board" ? loadRankings() : loadHistory());
document.querySelectorAll(".tab").forEach((btn) => {
  btn.onclick = () => {
    tab = btn.dataset.tab;
    document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === btn));
    $("#view-draft").hidden = tab !== "draft";
    $("#view-board").hidden = tab !== "board";
    $("#view-history").hidden = tab !== "history";
    if (tab !== "draft") refreshTab();
    window.scrollTo(0, 0);
  };
});

// live pick clock — derived deadline ticked down every second, no extra polling
function fmtDur(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
  const p = (n) => String(n).padStart(2, "0");
  return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${m}:${p(s)}`;
}
function tickClock() {
  const el = $("#clock"); // lives in the hero; absent when there's no clock
  if (!el || !latest?.clock?.deadline) return;
  const rem = latest.clock.deadline - Math.floor(Date.now() / 1000);
  el.classList.toggle("warn", rem <= 3600 && rem > 900);
  el.classList.toggle("crit", rem > 0 && rem <= 900);
  const me = latest?.onTheClock?.isMe;
  el.innerHTML = rem > 0
    ? `⏱ ${fmtDur(rem)}<span class="u">${me ? "to pick" : "left"}</span>`
    : `⏱<span class="u">time expired</span>`;
  // auto-pick countdown (only present on my clock)
  const ap = $("#autopick");
  if (ap && latest?.autopick) {
    const a = latest.autopick.deadline - Math.floor(Date.now() / 1000);
    const verb = latest.autopick.armed ? "Auto-picks" : "Would auto-pick";
    const who = latest.autopick.player.name.split(",")[0];
    ap.innerHTML = a > 0
      ? `🛟 ${verb} <b>${who}</b> in <b>${fmtDur(a)}</b>${latest.autopick.armed ? "" : " · off"}`
      : `🛟 ${latest.autopick.armed ? "Auto-picking" : "Would auto-pick"} <b>${who}</b>…`;
  }
}
setInterval(tickClock, 1000);

load();
setInterval(refreshTab, 15000);
</script>
