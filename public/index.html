<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b0d" />
<title>MFL Copilot — Draft Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b0d; --panel: #14161a; --panel2: #181b21; --line: #262a32;
    --txt: #eceef1; --mut: #868b95; --dim: #5a5f69;
    --take: #ff5d2e; --lean: #ffc23d; --wait: #34d27b; --clock: #ff5d2e;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --disp: "Archivo", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--txt); font-family: var(--disp);
    min-height: 100dvh; padding: 0 14px 40px; max-width: 560px; margin: 0 auto;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 38px 38px; background-position: -1px -1px;
  }
  body::before { /* vignette so the grid fades */
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(120% 80% at 50% 0%, transparent 30%, var(--bg) 78%);
  }
  #app { position: relative; z-index: 1; }

  header {
    display: flex; align-items: center; gap: 10px; padding: 18px 2px 14px;
    position: sticky; top: 0; background: linear-gradient(var(--bg) 72%, transparent);
    z-index: 5;
  }
  .brand { font-family: var(--mono); font-weight: 700; letter-spacing: .14em;
    font-size: 12px; color: var(--mut); text-transform: uppercase; }
  .live { width: 7px; height: 7px; border-radius: 50%; background: var(--wait);
    box-shadow: 0 0 0 0 var(--wait); animation: ping 2.4s infinite; }
  @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(52,210,123,.5); } 70%,100% { box-shadow: 0 0 0 7px transparent; } }
  .spacer { flex: 1; }
  .prog { font-family: var(--mono); font-size: 11px; color: var(--dim); }
  .dry { font-family: var(--mono); font-size: 9.5px; font-weight: 700; letter-spacing: .1em;
    padding: 3px 6px; border: 1px solid var(--lean); color: var(--lean); border-radius: 4px; }

  /* hero */
  .hero { border: 1px solid var(--line); background: var(--panel); border-radius: 14px;
    padding: 20px; margin-bottom: 16px; overflow: hidden; position: relative; }
  .hero.me { border-color: var(--clock);
    background: linear-gradient(180deg, rgba(255,93,46,.14), var(--panel) 60%);
    box-shadow: 0 0 40px -12px rgba(255,93,46,.5); }
  .hero .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--mut); }
  .hero.me .eyebrow { color: var(--clock); animation: blink 1.4s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .hero h1 { font-family: var(--disp); font-weight: 900; font-size: 30px; line-height: 1.02;
    margin-top: 7px; letter-spacing: -.02em; }
  .hero .sub { font-family: var(--mono); font-size: 13px; color: var(--mut); margin-top: 9px; }
  .hero .sub b { color: var(--txt); }

  .listhead { display: flex; align-items: baseline; gap: 8px; padding: 4px 4px 10px; }
  .listhead h2 { font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--mut); font-weight: 700; }
  .listhead .hint { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-left: auto; }

  /* candidate card */
  .card { border: 1px solid var(--line); background: var(--panel); border-radius: 13px;
    padding: 14px; margin-bottom: 11px; position: relative;
    opacity: 0; transform: translateY(8px); animation: rise .5s forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  .card .top { display: flex; align-items: flex-start; gap: 11px; }
  .rk { font-family: var(--mono); font-weight: 700; font-size: 12px; color: var(--dim);
    border: 1px solid var(--line); border-radius: 7px; padding: 4px 7px; min-width: 34px;
    text-align: center; margin-top: 2px; }
  .who { flex: 1; min-width: 0; }
  .nm { font-family: var(--disp); font-weight: 700; font-size: 19px; letter-spacing: -.01em; }
  .meta { font-family: var(--mono); font-size: 11.5px; color: var(--mut); margin-top: 2px; }
  .chip { font-family: var(--mono); font-weight: 700; font-size: 10px; letter-spacing: .1em;
    padding: 5px 8px; border-radius: 6px; text-transform: uppercase; white-space: nowrap; }
  .chip.take { background: rgba(255,93,46,.16); color: var(--take); border: 1px solid rgba(255,93,46,.4); }
  .chip.lean { background: rgba(255,194,61,.14); color: var(--lean); border: 1px solid rgba(255,194,61,.36); }
  .chip.wait { background: rgba(52,210,123,.13); color: var(--wait); border: 1px solid rgba(52,210,123,.34); }

  .stats { display: flex; align-items: center; gap: 14px; margin: 13px 0 3px; }
  .copies { display: flex; gap: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid var(--dim); }
  .dot.on { background: var(--txt); border-color: var(--txt); }
  .surv { flex: 1; }
  .surv .bar { height: 6px; background: #20242c; border-radius: 99px; overflow: hidden; }
  .surv .fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
  .surv .lab { font-family: var(--mono); font-size: 10px; color: var(--mut); margin-top: 4px;
    display: flex; justify-content: space-between; }
  .why { font-size: 13px; line-height: 1.4; color: var(--mut); margin-top: 10px;
    border-top: 1px dashed var(--line); padding-top: 10px; }

  .draft { width: 100%; margin-top: 12px; padding: 13px; border-radius: 10px; border: none;
    font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: .08em;
    text-transform: uppercase; cursor: pointer; background: var(--panel2); color: var(--dim);
    border: 1px solid var(--line); }
  .card.actionable .draft { background: var(--clock); color: #11070a; border-color: var(--clock); }
  .card.actionable .draft:active { transform: scale(.985); }

  .foot { text-align: center; font-family: var(--mono); font-size: 10px; color: var(--dim);
    margin-top: 18px; }

  /* confirm sheet */
  .sheet { position: fixed; inset: 0; z-index: 20; display: none; align-items: flex-end;
    background: rgba(0,0,0,.6); backdrop-filter: blur(3px); }
  .sheet.open { display: flex; }
  .sheet .panel { width: 100%; max-width: 560px; margin: 0 auto; background: var(--panel);
    border: 1px solid var(--line); border-bottom: none; border-radius: 18px 18px 0 0;
    padding: 22px 18px calc(22px + env(safe-area-inset-bottom)); animation: up .25s ease; }
  @keyframes up { from { transform: translateY(100%); } }
  .sheet .q { font-family: var(--disp); font-weight: 900; font-size: 22px; }
  .sheet .det { font-family: var(--mono); font-size: 12px; color: var(--mut); margin: 8px 0 18px; }
  .sheet .row { display: flex; gap: 10px; }
  .sheet button { flex: 1; padding: 14px; border-radius: 11px; font-family: var(--mono);
    font-weight: 700; font-size: 13px; cursor: pointer; border: 1px solid var(--line); }
  .sheet .yes { background: var(--clock); color: #11070a; border-color: var(--clock); }
  .sheet .no { background: transparent; color: var(--mut); }
  .sheet .result { font-family: var(--mono); font-size: 13px; line-height: 1.5; color: var(--txt); }
  .skel { color: var(--dim); font-family: var(--mono); font-size: 12px; text-align: center; padding: 40px 0; }

  /* bottom tab bar */
  body { padding-bottom: calc(74px + env(safe-area-inset-bottom)); }
  .tabs { position: fixed; left: 0; right: 0; bottom: 0; z-index: 15;
    display: flex; gap: 6px; padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 28%);
    max-width: 560px; margin: 0 auto; }
  .tab { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--panel); color: var(--mut); font-family: var(--mono); font-weight: 700;
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; }
  .tab span { font-size: 14px; margin-right: 4px; }
  .tab.active { color: var(--txt); border-color: var(--clock); background: var(--panel2);
    box-shadow: 0 0 24px -12px var(--clock); }

  /* full rankings rows */
  .tier { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .16em;
    text-transform: uppercase; color: var(--dim); padding: 16px 4px 8px;
    position: sticky; top: 56px; background: linear-gradient(var(--bg) 70%, transparent); z-index: 2; }
  .rrow { display: flex; align-items: center; gap: 11px; padding: 10px 4px;
    border-bottom: 1px solid var(--line); }
  .rrow.gone { opacity: .34; }
  .rrk { font-family: var(--mono); font-size: 11px; color: var(--dim); min-width: 32px; }
  .rwho { flex: 1; min-width: 0; }
  .rnm { font-family: var(--disp); font-weight: 700; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rrow.gone .rnm { text-decoration: line-through; }
  .rmeta { font-family: var(--mono); font-size: 10.5px; color: var(--mut); }
  .rright { display: flex; align-items: center; gap: 9px; }
  .gonetag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em;
    color: var(--take); border: 1px solid rgba(255,93,46,.4); border-radius: 4px; padding: 2px 5px; }
</style>

<div id="app">
  <header>
    <span class="live"></span>
    <span class="brand">MFL Copilot</span>
    <span class="spacer"></span>
    <span class="prog" id="prog">—</span>
    <span class="dry" id="dry" hidden>DRY RUN</span>
  </header>
  <main id="view-draft">
    <div id="hero"></div>
    <div class="listhead"><h2 id="listtitle">Board</h2><span class="hint" id="hint"></span></div>
    <div id="list"><div class="skel">acquiring draft feed…</div></div>
    <div class="foot" id="foot"></div>
  </main>
  <main id="view-board" hidden>
    <div class="listhead"><h2 id="rtitle">Full Board</h2><span class="hint" id="rhint"></span></div>
    <div id="rankings"><div class="skel">loading board…</div></div>
  </main>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="draft"><span>◬</span> Draft</button>
  <button class="tab" data-tab="board"><span>≣</span> Board</button>
</nav>

<div class="sheet" id="sheet">
  <div class="panel" id="sheetPanel"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const callColor = { take: "var(--take)", lean: "var(--lean)", wait: "var(--wait)" };
let latest = null;

async function load() {
  try {
    const b = await (await fetch("/api/board")).json();
    latest = b;
    render(b);
  } catch (e) {
    $("#list").innerHTML = `<div class="skel">feed unavailable — retrying…</div>`;
  }
}

function render(b) {
  $("#dry").hidden = !b.dryRun;
  $("#prog").textContent = `PICK ${b.picksMade + 1} / ${b.totalPicks}`;
  const clock = b.onTheClock;
  const me = clock && clock.isMe;

  $("#hero").innerHTML = me
    ? `<div class="hero me"><div class="eyebrow">● You're on the clock</div>
         <h1>Round ${+clock.round}, Pick ${+clock.pick}</h1>
         <div class="sub">tap a player below to draft them${b.dryRun ? " · <b>dry run</b>" : ""}</div></div>`
    : `<div class="hero"><div class="eyebrow">On the clock</div>
         <h1>${clock ? `Franchise ${clock.franchise}` : "Draft complete"}</h1>
         <div class="sub">${b.myNextPick
            ? `your pick: <b>R${+b.myNextPick.round} P${+b.myNextPick.pick}</b> · in <b>${b.gap}</b> picks`
            : "no upcoming picks"}</div></div>`;

  $("#listtitle").textContent = me ? "Who do you want?"
    : `Likely at your pick${b.myNextPick ? ` (R${+b.myNextPick.round} P${+b.myNextPick.pick})` : ""}`;
  $("#hint").textContent = me ? "tap to draft" : "peek ahead";
  $("#list").innerHTML = b.candidates.map((c, i) => card(c, i, b.mode)).join("");
  b.candidates.forEach((c) => {
    const el = document.getElementById("draft-" + c.id);
    if (el) el.onclick = () => confirmPick(c);
  });
  $("#foot").textContent = `updated ${new Date().toLocaleTimeString()} · auto-refresh 15s`;
}

function card(c, i, mode) {
  const me = mode === "onclock";
  const pct = Math.round(c.pSurvive * 100);
  const col = callColor[c.call];
  const dots = [0, 1, 2].map((d) => `<span class="dot ${d < c.remaining ? "on" : ""}"></span>`).join("");
  // chip wording depends on context: on the clock you can act (take/wait);
  // waiting, you can only forecast (safe/slipping).
  const labels = me
    ? { take: "TAKE NOW", lean: "LEAN", wait: "WAIT" }
    : { take: "SLIPPING", lean: "COIN FLIP", wait: "SAFE" };
  const survLabel = me ? "survives to your next pick" : "survives to your pick";
  return `<div class="card ${me ? "actionable" : ""}" style="animation-delay:${i * 55}ms">
    <div class="top">
      <span class="rk">#${c.rank}</span>
      <div class="who"><div class="nm">${c.name}</div><div class="meta">${c.pos} · ${c.nfl}</div></div>
      <span class="chip ${c.call}">${labels[c.call]}</span>
    </div>
    <div class="stats">
      <div class="copies" title="copies left">${dots}</div>
      <div class="surv">
        <div class="bar"><div class="fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="lab"><span>${survLabel}</span><span style="color:${col}">${pct}%</span></div>
      </div>
    </div>
    <div class="why">${c.why}</div>
    <button class="draft" id="draft-${c.id}">${me ? "Draft " + c.name.split(",")[0] : "not your pick yet"}</button>
  </div>`;
}

function confirmPick(c) {
  const me = latest?.onTheClock?.isMe;
  if (!me) return;
  const sheet = $("#sheet");
  $("#sheetPanel").innerHTML = `
    <div class="q">Draft ${c.name}?</div>
    <div class="det">${c.pos} · ${c.nfl} · R${+latest.onTheClock.round} P${+latest.onTheClock.pick}
      ${latest.dryRun ? "· DRY RUN (won't submit)" : ""}</div>
    <div class="row"><button class="no" id="cancel">Cancel</button>
      <button class="yes" id="go">${latest.dryRun ? "Preview" : "Draft"}</button></div>`;
  sheet.classList.add("open");
  $("#cancel").onclick = () => sheet.classList.remove("open");
  $("#go").onclick = () => submitPick(c);
}

async function submitPick(c) {
  $("#sheetPanel").innerHTML = `<div class="result">submitting ${c.name}…</div>`;
  try {
    const r = await (await fetch("/api/pick", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ playerId: c.id }),
    })).json();
    const msg = r.dryRun
      ? `🧪 DRY RUN — would draft <b>${r.would.name}</b> at R${+r.would.round} P${+r.would.pick}.<br><br>Set DRY_RUN=false to arm live picks.`
      : r.drafted
      ? `✅ Drafted <b>${r.drafted.name}</b>.`
      : `⚠️ ${r.error || "could not draft"}`;
    $("#sheetPanel").innerHTML = `<div class="result">${msg}</div>
      <div class="row" style="margin-top:18px"><button class="no" id="done">Close</button></div>`;
    $("#done").onclick = () => { $("#sheet").classList.remove("open"); load(); };
  } catch (e) {
    $("#sheetPanel").innerHTML = `<div class="result">⚠️ request failed</div>
      <div class="row" style="margin-top:18px"><button class="no" id="done">Close</button></div>`;
    $("#done").onclick = () => $("#sheet").classList.remove("open");
  }
}

// --- full board tab ---
function renderRankings(b) {
  const avail = b.players.filter((p) => p.remaining >= 1).length;
  $("#rhint").textContent = `${avail} / ${b.players.length} available`;
  let html = "", tier = null;
  for (const p of b.players) {
    if (p.tier !== tier) { tier = p.tier; html += `<div class="tier">Tier ${tier}</div>`; }
    const gone = p.remaining < 1;
    const dots = [0, 1, 2].map((d) => `<span class="dot ${d < p.remaining ? "on" : ""}"></span>`).join("");
    html += `<div class="rrow ${gone ? "gone" : ""}">
      <span class="rrk">#${p.rank}</span>
      <div class="rwho"><div class="rnm">${p.name}</div><div class="rmeta">${p.pos} · ${p.nfl}</div></div>
      <div class="rright">${gone ? `<span class="gonetag">GONE</span>` : `<div class="copies">${dots}</div>`}</div>
    </div>`;
  }
  $("#rankings").innerHTML = html;
}
async function loadRankings() {
  try { renderRankings(await (await fetch("/api/rankings")).json()); }
  catch { $("#rankings").innerHTML = `<div class="skel">board unavailable</div>`; }
}

// --- tabs ---
let tab = "draft";
document.querySelectorAll(".tab").forEach((btn) => {
  btn.onclick = () => {
    tab = btn.dataset.tab;
    document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === btn));
    $("#view-draft").hidden = tab !== "draft";
    $("#view-board").hidden = tab !== "board";
    if (tab === "board") loadRankings();
    window.scrollTo(0, 0);
  };
});

load();
setInterval(() => (tab === "draft" ? load() : loadRankings()), 15000);
</script>
